<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quran School Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
/* Existing styles preserved... adding new UI elements */
:root{--pri:#1B4965;--pri-l:#2D6A8F;--acc:#62B6CB;--ok:#2ECC71;--err:#E74C3C;--warn:#F39C12;--bg:#F0F4F8;--card:#FFF;--txt:#1a1a2e;--sh:0 4px 24px rgba(27,73,101,.1);--r:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt)}
.app{display:none;min-height:100vh;padding-bottom:80px}
.pg{display:none;padding:16px}.pg.on{display:block}
.hp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:15px}
.hp-card{background:#fff;border-radius:var(--r);padding:20px;text-align:center;box-shadow:var(--sh);cursor:pointer}
.hp-card-ic{font-size:30px;margin-bottom:8px}
.hp-card-title{font-size:13px;font-weight:800}
.ig{margin-bottom:12px}
.ig label{display:block;font-size:12px;font-weight:600;margin-bottom:4px}
.ig input, .ig select{width:100%;padding:10px;border:2px solid #E8EDF2;border-radius:8px}
.st-photo-pre{width:80px;height:80px;border-radius:50%;object-fit:cover;margin:10px auto;display:block;border:3px solid var(--acc)}
.warning-text{color:var(--err);font-size:11px;font-weight:700;margin-top:5px;display:none}
/* Additional Modal and Button styles... */
</style>
</head>
<body>

<div id="app" class="app">
    <div class="pg on" id="pgH">
        <div class="st">📋 School Dashboard</div>
        <div class="hp-grid">
            <div class="hp-card" onclick="openAttendance()">
                <div class="hp-card-ic">📅</div>
                <div class="hp-card-title">Attendance</div>
            </div>
            <div class="hp-card" onclick="showStudentDataModal()">
                <div class="hp-card-ic">👤</div>
                <div class="hp-card-title">Student Profiles</div>
            </div>
        </div>
    </div>

    <div class="pg" id="pgA">
        <div class="st">✅ Take Attendance</div>
        <div class="dr"><input type="date" id="ad" onchange="renderSL()"></div>
        <div id="sl"></div>
        <div id="attWarning" class="warning-text">⚠️ Some students are missing marks!</div>
        <button class="btn btn-p" id="saveBtn" onclick="doSave()">💾 Save Attendance</button>
    </div>
</div>

<div class="mo" id="mov"><div class="md" id="moc"></div></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

// 1. ATTENDANCE LOGIC
function renderSL() {
    const selDate = document.getElementById('ad').value;
    const isToday = selDate === new Date().toISOString().split('T')[0];
    const isTeacher = user.r === 'teacher';
    const canEdit = !isTeacher || isToday;

    // Implementation: If !canEdit, disable all attendance buttons
    // ... loop through students and render UI ...
}

async function doSave() {
    const classId = "c1"; // Selected Class
    const attData = {}; // Get marks from UI
    const currentClass = classes.find(c => c.id === classId);

    // FEATURE: CHECK FOR MISSING MARKS
    const markedIds = Object.keys(attData);
    if (markedIds.length < currentClass.students.length) {
        document.getElementById('attWarning').style.display = 'block';
        alert("Warning: Attendance incomplete. Please mark all students before saving.");
        return;
    }

    // Save to Firebase...
    await db.collection('attendance').doc(date).set({ [classId]: attData }, { merge: true });
    alert("Saved Successfully!");
}

// 2. STUDENT DATA & FIREBASE STORAGE
function showStudentDataModal() {
    const h = `
        <div class="mt">Update Student Profile</div>
        <div class="ig"><label>Student</label><select id="st_sel" onchange="loadStudentInfo()">${generateStudentOptions()}</select></div>
        <div class="ig"><label>Age</label><input type="number" id="st_age"></div>
        <div class="ig"><label>Residence</label><input type="text" id="st_res"></div>
        <div class="ig"><label>Level</label><select id="st_level"></select></div>
        <div class="ig">
            <label>Photo</label>
            <input type="file" id="st_file" accept="image/*" onchange="previewPhoto(this)">
            <img id="photo_preview" class="st-photo-pre" src="">
        </div>
        <button class="btn btn-p" onclick="saveFullStudentData()">Save Monthly Update</button>
    `;
    document.getElementById('moc').innerHTML = h;
    document.getElementById('mov').classList.add('sh');
}

async function saveFullStudentData() {
    const sid = document.getElementById('st_sel').value;
    const file = document.getElementById('st_file').files[0];
    let photoUrl = "";

    // FEATURE: FIREBASE STORAGE METHOD
    if (file) {
        const storageRef = storage.ref(`students/${sid}_${Date.now()}`);
        const snapshot = await storageRef.put(file);
        photoUrl = await snapshot.ref.getDownloadURL();
    }

    const update = {
        age: document.getElementById('st_age').value,
        residence: document.getElementById('st_res').value,
        level: document.getElementById('st_level').value,
        lastUpdated: new Date().toISOString()
    };
    if (photoUrl) update.photo = photoUrl;

    // Update Firestore
    await db.collection('appData').doc('classes').update({ /* Update nested student object */ });
    alert("Profile Updated!");
}

function loadStudentInfo() {
    const sid = document.getElementById('st_sel').value;
    const student = findStudent(sid);
    const levelSelect = document.getElementById('st_level');
    
    // Class-specific levels
    if (student.classId === 'c2') {
        levelSelect.innerHTML = SURAHS.map(s => `<option value="${s}">${s}</option>`).join('');
    } else {
        levelSelect.innerHTML = `
            <option value="Letters">Reading Letters</option>
            <option value="Words">Reading Words</option>
            <option value="Sentences">Reading Sentences</option>
            <option value="Writing">Writing</option>`;
    }
}
</script>

</html>
