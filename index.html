<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quran School Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--pri:#1B4965;--pri-l:#2D6A8F;--acc:#62B6CB;--ok:#2ECC71;--err:#E74C3C;--warn:#F39C12;--bg:#F0F4F8;--card:#FFF;--txt:#1a1a2e;--sh:0 4px 24px rgba(27,73,101,.1);--r:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden}
.app{min-height:100vh;padding-bottom:80px}
.pg{display:none;padding:16px}.pg.on{display:block}
.st{font-size:20px;font-weight:800;margin-bottom:20px;color:var(--pri)}
.hp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:15px}
.hp-card{background:#fff;border-radius:var(--r);padding:20px;text-align:center;box-shadow:var(--sh);cursor:pointer;transition:0.2s}
.hp-card:active{transform:scale(0.95)}
.hp-card-ic{font-size:30px;margin-bottom:8px}
.hp-card-title{font-size:13px;font-weight:800}
.ig{margin-bottom:15px}
.ig label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--pri)}
.ig input, .ig select{width:100%;padding:12px;border:2px solid #E8EDF2;border-radius:10px;font-family:inherit}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-p{background:var(--pri);color:#fff}
.sl-item{background:#fff;padding:12px;border-radius:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh)}
.ab-group{display:flex;gap:6px}
.ab{padding:8px 12px;border-radius:8px;border:none;font-weight:700;font-size:12px}
.ab.p{background:#E8F8F0;color:var(--ok)}
.ab.p.on{background:var(--ok);color:#fff}
.ab.a{background:#FEECEC;color:var(--err)}
.ab.a.on{background:var(--err);color:#fff}
.mo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
.mo.on{display:flex}
.md{background:#fff;width:90%;max-width:400px;padding:24px;border-radius:20px;max-height:80vh;overflow-y:auto}
.st-photo-pre{width:80px;height:80px;border-radius:50%;object-fit:cover;margin:10px auto;display:block;border:3px solid var(--acc);background:#eee}
</style>
</head>
<body>

<div id="app" class="app">
    <div class="pg on" id="pgH">
        <div class="st">🏫 Quran School Portal</div>
        <div class="hp-grid">
            <div class="hp-card" onclick="showPg('pgA')">
                <div class="hp-card-ic">📅</div>
                <div class="hp-card-title">Attendance</div>
            </div>
            <div class="hp-card" onclick="showStudentDataModal()">
                <div class="hp-card-ic">👤</div>
                <div class="hp-card-title">Student Data</div>
            </div>
        </div>
    </div>

    <div class="pg" id="pgA">
        <div class="st" onclick="showPg('pgH')" style="cursor:pointer">⬅️ Attendance</div>
        <div class="ig">
            <label>Select Date</label>
            <input type="date" id="ad" onchange="renderSL()">
        </div>
        <div class="ig">
            <label>Select Class</label>
            <select id="cl_sel" onchange="renderSL()">
                <option value="c1">Class 1 (Basics)</option>
                <option value="c2">Class 2 (Quran)</option>
            </select>
        </div>
        <div id="sl"></div>
        <button class="btn btn-p" id="saveBtn" onclick="doSave()">💾 Save Marks</button>
    </div>
</div>

<div class="mo" id="mov"><div class="md" id="moc"></div></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<script>
const $ = id => document.getElementById(id);

// ======= 1. FIREBASE CONFIG (PASTE YOUR KEYS HERE) =======
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

// Initialize
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// ======= 2. DATA & CONSTANTS =======
let user = { r: 'teacher', n: 'Instructor' }; 
let classes = [
    { id: 'c1', name: 'Class 1', students: [{id:'s1', n:'Ahmad'}, {id:'s2', n:'Sara'}] },
    { id: 'c2', name: 'Class 2', students: [{id:'s3', n:'Omar'}, {id:'s4', n:'Layla'}] }
];
let att = {}; // Attendance state
const SURAHS = ["Al-Fatihah", "Al-Baqarah", "Al-Imran", "An-Nisa", "Al-Ma'idah", "Al-An'am", "Al-A'raf", "Al-Anfal", "At-Tawbah", "Yunus", "Hud", "Yusuf", "Ar-Ra'd", "Ibrahim", "Al-Hijr", "An-Nahl", "Al-Isra", "Al-Kahf", "Maryam", "Ta-Ha", "Al-Anbiya", "Al-Hajj", "Al-Mu'minun", "An-Nur", "Al-Furqan", "Ash-Shu'ara", "An-Naml", "Al-Qasas", "Al-Ankabut", "Ar-Rum", "Luqman", "As-Sajdah", "Al-Ahzab", "Saba", "Fatir", "Ya-Sin", "As-Saffat", "Sad", "Az-Zumar", "Ghafir", "Fussilat", "Ash-Shura", "Az-Zukhruf", "Ad-Dukhan", "Al-Jathiyah", "Al-Ahqaf", "Muhammad", "Al-Fath", "Al-Hujurat", "Qaf", "Adh-Dhariyat", "At-Tur", "An-Najm", "Al-Qamar", "Ar-Rahman", "Al-Waqi'ah", "Al-Hadid", "Al-Mujadilah", "Al-Hashr", "Al-Mumtahanah", "As-Saff", "Al-Jumu'ah", "Al-Munafiqun", "At-Taghabun", "At-Talaq", "At-Tahrim", "Al-Mulk", "Al-Qalam", "Al-Haqqah", "Al-Ma'arij", "Nuh", "Al-Jinn", "Al-Muzzammil", "Al-Muddaththir", "Al-Qiyamah", "Al-Insan", "Al-Mursalat", "An-Naba", "An-Nazi'at", "Abasa", "At-Takwir", "Al-Infitar", "Al-Mutaffifin", "Al-Inshiqaq", "Al-Buruj", "At-Tariq", "Al-A'la", "Al-Ghashiyah", "Al-Fajr", "Al-Balad", "Ash-Shams", "Al-Layl", "Ad-Duha", "Ash-Sharh", "At-Tin", "Al-Alaq", "Al-Qadr", "Al-Bayyinah", "Az-Zalzalah", "Al-Adiyat", "Al-Qari'ah", "At-Takathur", "Al-Asr", "Al-Humazah", "Al-Fil", "Quraysh", "Al-Ma'un", "Al-Kawthar", "Al-Kafirun", "An-Nasr", "Al-Masad", "Al-Ikhlas", "Al-Falaq", "An-Nas"];

// ======= 3. NAVIGATION & UI =======
function showPg(id) {
    document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
    $(id).classList.add('on');
    if(id === 'pgA') {
        $('ad').value = new Date().toISOString().split('T')[0];
        renderSL();
    }
}

function renderSL() {
    const date = $('ad').value;
    const cid = $('cl_sel').value;
    const isToday = date === new Date().toISOString().split('T')[0];
    const isTeacher = user.r === 'teacher';
    const locked = isTeacher && !isToday;

    const classObj = classes.find(c => c.id === cid);
    let h = '';
    
    classObj.students.forEach(s => {
        const mark = (att[date] && att[date][cid]) ? att[date][cid][s.id] : null;
        h += `
        <div class="sl-item">
            <div style="font-weight:600">${s.n}</div>
            <div class="ab-group">
                <button class="ab p ${mark==='p'?'on':''}" ${locked?'disabled':''} onclick="setM('${s.id}','p')">P</button>
                <button class="ab a ${mark==='a'?'on':''}" ${locked?'disabled':''} onclick="setM('${s.id}','a')">A</button>
            </div>
        </div>`;
    });
    $('sl').innerHTML = h;
    if(locked) $('saveBtn').style.display = 'none';
    else $('saveBtn').style.display = 'block';
}

function setM(sid, m) {
    const date = $('ad').value;
    const cid = $('cl_sel').value;
    if(!att[date]) att[date] = {};
    if(!att[date][cid]) att[date][cid] = {};
    att[date][cid][sid] = m;
    renderSL();
}

// ======= 4. ATTENDANCE SAVING (WITH VALIDATION) =======
async function doSave() {
    const date = $('ad').value;
    const cid = $('cl_sel').value;
    const classObj = classes.find(c => c.id === cid);
    
    const marks = att[date] ? att[date][cid] : null;
    const count = marks ? Object.keys(marks).length : 0;

    if (count < classObj.students.length) {
        alert("⚠️ Please mark attendance for ALL students before saving.");
        return;
    }

    try {
        await db.collection('attendance').doc(date).set({ [cid]: marks }, { merge: true });
        alert("Saved successfully! ✅");
    } catch(e) { alert("Error saving: " + e.message); }
}

// ======= 5. STUDENT DATA & PHOTOS (FIREBASE STORAGE) =======
function showStudentDataModal() {
    let opts = '';
    classes.forEach(c => c.students.forEach(s => opts += `<option value="${s.id}">${s.n} (${c.name})</option>`));

    const h = `
        <div class="st">Student Profile</div>
        <div class="ig"><label>Select Student</label><select id="st_id" onchange="loadLevelList()">${opts}</select></div>
        <div class="ig"><label>Age</label><input type="number" id="st_age"></div>
        <div class="ig"><label>Residence</label><input type="text" id="st_res"></div>
        <div class="ig"><label>Level / Progress</label><select id="st_lvl"></select></div>
        <div class="ig">
            <label>Upload Photo</label>
            <input type="file" id="st_file" accept="image/*" onchange="preImg(this)">
            <img id="st_pre" class="st-photo-pre">
        </div>
        <button class="btn btn-p" onclick="saveProfile()">Save Profile</button>
        <button class="btn" onclick="$('mov').classList.remove('on')">Cancel</button>
    `;
    $('moc').innerHTML = h;
    $('mov').classList.add('on');
    loadLevelList();
}

function loadLevelList() {
    const sid = $('st_id').value;
    const isClass2 = sid.startsWith('s3') || sid.startsWith('s4'); // Simplified logic
    let h = '';
    if(isClass2) SURAHS.forEach(s => h += `<option value="${s}">${s}</option>`);
    else h = `<option>Letters</option><option>Words</option><option>Sentences</option><option>Writing</option>`;
    $('st_lvl').innerHTML = h;
}

function preImg(input) {
    if (input.files && input.files[0]) {
        const r = new FileReader();
        r.onload = e => $('st_pre').src = e.target.result;
        r.readAsDataURL(input.files[0]);
    }
}

async function saveProfile() {
    const sid = $('st_id').value;
    const file = $('st_file').files[0];
    let url = "";

    try {
        if(file) {
            const ref = storage.ref(`students/${sid}.jpg`);
            const snap = await ref.put(file);
            url = await snap.ref.getDownloadURL();
        }

        const data = {
            age: $('st_age').value,
            res: $('st_res').value,
            lvl: $('st_lvl').value,
            photo: url || ""
        };

        // Note: You should update your specific student record in Firestore here
        alert("Student data saved! ✅");
        $('mov').classList.remove('on');
    } catch(e) { alert("Error: " + e.message); }
}
</script>
</body>
</html>
