<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quran School Attendance</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pri:#1B4965;--pri-l:#2D6A8F;--pri-d:#0F2D3F;--acc:#62B6CB;--acc-l:#BEE9E8;--ok:#2ECC71;--ok-d:#27AE60;--err:#E74C3C;--warn:#F39C12;--orp:#9B59B6;--orp-l:#F4ECF7;--bg:#F0F4F8;--card:#FFF;--txt:#1a1a2e;--txt2:#6B7B8D;--sh:0 4px 24px rgba(27,73,101,.1);--r:16px;--rs:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.loader .sp{width:48px;height:48px;border:4px solid var(--acc-l);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
.loader.hide{display:none}

/* LOGIN */
.login-page{min-height:100vh;display:none;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--pri-d),var(--pri))}
.login-box{background:#fff;border-radius:24px;padding:35px 25px;width:100%;max-width:380px;box-shadow:0 10px 40px rgba(0,0,0,0.2);animation:fadeUp .4s ease}
.login-logo{width:65px;height:65px;border-radius:15px;background:linear-gradient(135deg,var(--pri),var(--acc));display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:30px;color:#fff}
.login-title{text-align:center;font-size:20px;font-weight:800;color:var(--pri-d);margin-bottom:4px}
.login-sub{text-align:center;font-size:12px;color:var(--txt2);margin-bottom:25px}
.ig{margin-bottom:15px}
.ig label{display:block;font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:6px}
.ig input,.ig select{width:100%;padding:12px 14px;border:2px solid #E8EDF2;border-radius:var(--rs);font:inherit;font-size:14px;transition:.2s;background:#FAFBFC}
.ig input:focus{outline:none;border-color:var(--acc);background:#fff}
.lerr{background:#FEE;color:var(--err);padding:10px;border-radius:8px;font-size:13px;margin-bottom:15px;display:none;text-align:center;font-weight:600}
.btn{width:100%;padding:14px;border:none;border-radius:var(--rs);font:inherit;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.btn-p{background:var(--pri);color:#fff;box-shadow:0 4px 12px rgba(27,73,101,0.2)}
.btn-p:active{transform:scale(0.98)}

/* TOP BAR */
.app{display:none;min-height:100vh;padding-bottom:80px}
.top{background:linear-gradient(135deg,var(--pri-d),var(--pri));padding:12px 20px;display:flex;align-items:center;justify-content:space-between;color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
.top-t{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.top-a{display:flex;align-items:center;gap:10px}
.top-b{background:rgba(255,255,255,0.15);border:none;color:#fff;width:34px;height:34px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ubadge{background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}

/* NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;justify-content:space-around;padding:8px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(0,0,0,0.06);z-index:100}
.ni{flex:1;max-width:70px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;border:none;background:none;cursor:pointer;color:var(--txt2);font:inherit;font-size:10px;font-weight:700;transition:.2s;border-radius:12px}
.ni.on{color:var(--pri);background:var(--acc-l)}
.ni .ic{font-size:20px}

/* PAGES */
.pg{display:none;padding:16px 14px;animation:fadeUp 0.3s ease-out}.pg.on{display:block}
.st{font-size:18px;font-weight:800;color:var(--pri-d);margin-bottom:15px;display:flex;align-items:center;gap:10px}

/* HOME */
.hp-hero{background:linear-gradient(135deg,var(--pri-d),var(--pri));border-radius:20px;padding:25px 20px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden}
.hp-hero::after{content:'🕌';position:absolute;right:-10px;bottom:-10px;font-size:80px;opacity:0.1;transform:rotate(-15deg)}
.hp-greeting{font-size:13px;opacity:0.8;margin-bottom:4px}
.hp-name{font-size:24px;font-weight:800}
.hp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hp-card{background:#fff;border-radius:var(--r);padding:20px 15px;box-shadow:var(--sh);text-align:center;cursor:pointer;position:relative}
.hp-card-ic{font-size:32px;margin-bottom:10px}
.hp-card-title{font-size:13px;font-weight:800;color:var(--pri-d)}
.hp-card-badge{position:absolute;top:10px;right:10px;background:var(--orp-l);color:var(--orp);font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px}

/* STUDENT DATA UI */
.sd-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px}
.sd-stat{background:#fff;border-radius:12px;padding:12px 8px;text-align:center;box-shadow:var(--sh);border-bottom:3px solid #E8EDF2}
.sd-stat .sdn{font-size:18px;font-weight:900;color:var(--pri-d);display:block}
.sd-stat .sdl{font-size:9px;color:var(--txt2);font-weight:700;text-transform:uppercase}
.sd-stat.complete{border-color:var(--ok)}.sd-stat.incomplete{border-color:var(--warn)}

.sd-toolbar{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap}
.sd-search{flex:1;min-width:140px;padding:10px 14px;border:2px solid #E8EDF2;border-radius:10px;font-size:14px}
.sd-filter{padding:10px;border:2px solid #E8EDF2;border-radius:10px;background:#fff;font-size:13px}
.sd-export-btn{background:var(--pri);color:#fff;border:none;border-radius:10px;padding:0 15px;font-weight:700;font-size:12px;cursor:pointer}

.sd-card{background:#fff;border-radius:var(--r);margin-bottom:15px;box-shadow:var(--sh);overflow:hidden;border-left:6px solid #eee;transition:.2s}
.sd-card.orp{border-left-color:var(--orp);background:linear-gradient(to right, var(--orp-l) 0%, #fff 80px)}
.sd-card.incomplete-profile{border-left-color:var(--warn)}

.sd-card-header{padding:15px;display:flex;align-items:center;gap:15px;border-bottom:1px solid #f0f4f8}
.sd-photo{width:55px;height:55px;border-radius:50%;background:#f0f4f8;overflow:hidden;position:relative;cursor:pointer;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.sd-photo img{width:100%;height:100%;object-fit:cover}
.sd-photo::after{content:'📷';position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;font-size:18px}
.sd-photo:hover::after{opacity:1}

.sd-name{font-size:16px;font-weight:800;color:var(--pri-d)}
.sd-meta{font-size:11px;color:var(--txt2);font-weight:600;margin-top:2px}
.sd-badges{display:flex;gap:6px;margin-top:6px}
.sd-badge{font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px}
.sd-badge.complete{background:var(--ok);color:#fff}
.sd-badge.incomplete{background:var(--warn);color:#fff}
.sd-badge.orphan{background:var(--orp);color:#fff}

.sd-fields{padding:15px;display:grid;grid-template-columns:1fr 1fr;gap:15px}
.sd-field{display:flex;flex-direction:column;gap:5px}
.sd-field.full{grid-column:span 2}
.sd-field label{font-size:10px;font-weight:800;color:var(--txt2);text-transform:uppercase}
.sd-field input, .sd-field select, .sd-field textarea{padding:10px 12px;border:2px solid #E8EDF2;border-radius:8px;font-size:14px;background:#FAFBFC}
.sd-field textarea{height:70px;resize:none}
.sd-field .other-input{margin-top:6px;border-color:var(--acc);display:none}

.sd-actions{padding:0 15px 15px}
.sd-save-btn{width:100%;padding:12px;border:none;border-radius:10px;background:var(--ok);color:#fff;font-weight:800;cursor:pointer;transition:.2s}
.sd-save-btn.dirty{background:var(--warn)}
.sd-save-btn.saved{background:var(--ok-d)}

/* MISC */
.sp-class-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px}
.sp-class-tab{padding:8px 16px;background:#fff;border:2px solid #E8EDF2;border-radius:20px;white-space:nowrap;font-size:13px;font-weight:700;cursor:pointer}
.sp-class-tab.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--pri-d);color:#fff;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:700;z-index:1000;transition:.3s;box-shadow:0 8px 24px rgba(0,0,0,0.2);opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

</style>
</head>
<body>

<div class="loader" id="ld"><div class="sp"></div><div style="font-weight:700;color:var(--pri)">Initializing School...</div></div>

<div class="login-page" id="lp">
  <div class="login-box">
    <div class="login-logo">🏫</div>
    <div class="login-title">Quran School</div>
    <div class="login-sub">Attendance & Student Records</div>
    <div class="lerr" id="le"></div>
    <div class="ig"><label>Username</label><input type="text" id="un" placeholder="Enter username"></div>
    <div class="ig"><label>Password</label><input type="password" id="pw" placeholder="Enter password"></div>
    <button class="btn btn-p" onclick="doLogin()">Sign In</button>
  </div>
</div>

<div class="app" id="app">
  <div class="top">
    <div class="top-t"><span id="topTitle">Home</span></div>
    <div class="top-a"><span class="ubadge" id="ub"></span><button class="top-b" onclick="doLogout()">🚪</button></div>
  </div>

  <div class="pg on" id="pgH">
    <div class="hp-hero">
      <div class="hp-greeting">Assalamu Alaikum,</div>
      <div class="hp-name" id="hpName">User</div>
    </div>
    <div id="hpCards" class="hp-grid"></div>
  </div>

  <div class="pg" id="pgD">
    <div class="st">👥 Student Profiles</div>
    <div id="sdStats" class="sd-stats"></div>
    <div class="sp-class-tabs" id="sdTabs"></div>
    <div class="sd-toolbar">
      <input type="text" class="sd-search" id="sdSearch" placeholder="🔍 Search name..." oninput="filterStudentData()">
      <select class="sd-filter" id="sdFilterGender" onchange="filterStudentData()">
        <option value="All">All Genders</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
      <button class="sd-export-btn" onclick="exportStudentData()">📥 Export CSV</button>
    </div>
    <div id="sdList"></div>
    <input type="file" id="sdPhotoInput" style="display:none" accept="image/*">
  </div>

  <div class="pg" id="pgA"><div class="st">✅ Attendance</div><p style="text-align:center;color:var(--txt2);padding:40px">Attendance system ready.</p></div>
  <div class="pg" id="pgP"><div class="st">📚 Student Progress</div><p style="text-align:center;color:var(--txt2);padding:40px">Progress tracking ready.</p></div>
  <div class="pg" id="pgR"><div class="st">📈 Reports</div></div>
  <div class="pg" id="pgM"><div class="st">⚙️ Admin Panel</div></div>

  <div class="bnav" id="bnav"></div>
</div>

<div class="toast" id="tst"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// ===== CONFIG =====
const LIVE_WITH_OPTIONS = ['Both Parents', 'Father', 'Mother', 'Grandmother', 'Grandfather', 'Uncle', 'Aunt', 'Other'];
const SCHOOL_LEVEL_OPTIONS = ['Not Yet', 'KG/Preschool', 'Primary (1-6)', 'Intermediate (7-9)', 'Secondary (10-12)', 'University', 'Graduated', 'Not in School', 'Other'];
const ECONOMIC_STATUS_OPTIONS = ['Poor', 'Middle', 'Rich'];

// Replace these with your actual Firebase config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

// ===== STATE =====
let db, appData = { main: { classes: [], teachers: [], users: [] } };
let user = null, curPg = 'H', sdSelClass = null;
let studentProfiles = {};

const $ = id => document.getElementById(id);
const toast = (m, type='ok') => {
  const t = $('tst'); t.innerText = m; t.className = `toast show`;
  setTimeout(() => t.classList.remove('show'), 3000);
};

// Simple hashing to match your system's existing logic
function hashPW(s) {
  let h = 0; for (let i = 0; i < s.length; i++) h = (h << 5) - h + s.charCodeAt(i) | 0;
  return h.toString(36);
}

// ===== FIREBASE =====
async function initFirebase() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    
    // Listen to main data
    db.collection('app').doc('main').onSnapshot(doc => {
      if (doc.exists) {
        appData.main = doc.data();
        if (user) refreshUI();
      }
    });

    // Load detailed profiles
    const snap = await db.collection('studentData').get();
    snap.forEach(doc => { studentProfiles[doc.id] = doc.data(); });
    
    return true;
  } catch (e) { console.error(e); return false; }
}

// ===== LOGIN LOGIC =====
function doLogin() {
  const uInput = $('un').value.trim().toLowerCase();
  const pInput = $('pw').value.trim();
  const le = $('le');
  
  if (!uInput || !pInput) {
    le.innerText = "Enter username and password";
    le.style.display = 'block';
    return;
  }

  const h = hashPW(pInput);
  
  // Find user in the main database
  const found = appData.main.users?.find(x => x.u.toLowerCase() === uInput && (x.ph === h || x.p === pInput));

  if (found) {
    user = { 
      role: found.r === 'a' ? 'Admin' : 'Teacher', 
      name: found.u.charAt(0).toUpperCase() + found.u.slice(1),
      id: found.tid || 'admin'
    };
    
    $('lp').style.display = 'none';
    $('app').style.display = 'block';
    $('ub').innerText = user.role;
    renderNav();
    showPg('H');
  } else {
    le.innerText = "Invalid credentials";
    le.style.display = 'block';
  }
}

function doLogout() { location.reload(); }

// ===== NAVIGATION =====
const PAGES = [
  { id: 'H', ic: '🏠', lbl: 'Home' },
  { id: 'A', ic: '✅', lbl: 'Attend' },
  { id: 'D', ic: '👥', lbl: 'Data' },
  { id: 'P', ic: '📚', lbl: 'Progress' },
  { id: 'R', ic: '📈', lbl: 'Reports' },
  { id: 'M', ic: '⚙️', lbl: 'Admin', admin: true }
];

function renderNav() {
  $('bnav').innerHTML = PAGES.filter(p => !p.admin || user.role === 'Admin').map(p => `
    <button class="ni ${curPg === p.id ? 'on' : ''}" onclick="showPg('${p.id}')">
      <div class="ic">${p.ic}</div><div>${p.lbl}</div>
    </button>
  `).join('');
}

function showPg(id) {
  curPg = id;
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  $(`pg${id}`).classList.add('on');
  $('topTitle').innerText = PAGES.find(x => x.id === id).lbl;
  renderNav();
  if (id === 'H') renderHome();
  if (id === 'D') { sdSelClass = sdSelClass || appData.main.classes[0]?.id; renderStudentData(); }
}

// ===== STUDENT DATA LOGIC =====
function renderStudentData() {
  const classes = appData.main.classes || [];
  if (!classes.length) return;
  
  renderSDStats();
  
  $('sdTabs').innerHTML = classes.map(c => `
    <button class="sp-class-tab ${sdSelClass === c.id ? 'on' : ''}" onclick="selectSDClass('${c.id}')">${c.name}</button>
  `).join('');

  renderSDList();
}

function renderSDStats() {
  const cls = appData.main.classes.find(c => c.id === sdSelClass);
  if (!cls) return;
  
  let m = 0, f = 0, orp = 0, comp = 0;
  cls.students.forEach(s => {
    const p = studentProfiles[`${sdSelClass}__${s.id}`] || {};
    if (p.gender === 'Male') m++; else if (p.gender === 'Female') f++;
    if (s.orp || p.isOrphan) orp++;
    if (p.gender && p.address && p.schoolLevel) comp++;
  });

  $('sdStats').innerHTML = `
    <div class="sd-stat"><span class="sdn">${cls.students.length}</span><span class="sdl">Total</span></div>
    <div class="sd-stat"><span class="sdn">${orp}</span><span class="sdl" style="color:var(--orp)">Orphans</span></div>
    <div class="sd-stat complete"><span class="sdn">${comp}</span><span class="sdl">Profile OK</span></div>
  `;
}

function selectSDClass(id) { sdSelClass = id; renderStudentData(); }

function renderSDList() {
  const cls = appData.main.classes.find(c => c.id === sdSelClass);
  if (!cls) return;

  const search = $('sdSearch').value.toLowerCase();
  const genFilter = $('sdFilterGender').value;

  const filtered = cls.students.filter(s => {
    const p = studentProfiles[`${sdSelClass}__${s.id}`] || {};
    return s.name.toLowerCase().includes(search) && (genFilter === 'All' || p.gender === genFilter);
  });

  $('sdList').innerHTML = filtered.map(s => {
    const p = studentProfiles[`${sdSelClass}__${s.id}`] || {};
    const isOrp = s.orp || p.isOrphan;
    const isComp = p.gender && p.address && p.schoolLevel;

    return `
      <div class="sd-card ${isOrp ? 'orp' : ''} ${!isComp ? 'incomplete-profile' : ''}" id="card-${s.id}">
        <div class="sd-card-header">
          <div class="sd-photo" onclick="uploadStudentPhoto('${sdSelClass}', '${s.id}')">
            <img src="${p.photo || 'https://ui-avatars.com/api/?background=random&name=' + s.name}" id="img-${s.id}">
          </div>
          <div class="sd-info">
            <div class="sd-name">${s.name}</div>
            <div class="sd-meta">🎂 ${s.age || '?'} yrs • ${s.level || 'No Progress'}</div>
            <div class="sd-badges">
              ${isOrp ? '<span class="sd-badge orphan">Orphan</span>' : ''}
              ${isComp ? '<span class="sd-badge complete">Complete</span>' : '<span class="sd-badge incomplete">Incomplete</span>'}
            </div>
          </div>
        </div>
        <div class="sd-fields">
          <div class="sd-field">
            <label>Gender</label>
            <select id="gen-${s.id}" onchange="markDirty('${s.id}')">
              <option value="">-</option>
              <option value="Male" ${p.gender==='Male'?'selected':''}>Male</option>
              <option value="Female" ${p.gender==='Female'?'selected':''}>Female</option>
            </select>
          </div>
          <div class="sd-field">
            <label>Orphan?</label>
            <select id="orp-${s.id}" onchange="markDirty('${s.id}')" ${user.role!=='Admin'?'disabled':''}>
              <option value="No" ${!isOrp?'selected':''}>No</option>
              <option value="Yes" ${isOrp?'selected':''}>Yes</option>
            </select>
          </div>
          <div class="sd-field full"><label>Address</label><input type="text" id="add-${s.id}" value="${p.address||''}" oninput="markDirty('${s.id}')"></div>
          <div class="sd-field">
            <label>School</label>
            <select id="sch-${s.id}" onchange="markDirty('${s.id}')">
              ${SCHOOL_LEVEL_OPTIONS.map(o => `<option value="${o}" ${p.schoolLevel===o?'selected':''}>${o}</option>`).join('')}
            </select>
          </div>
          <div class="sd-field">
            <label>Economic</label>
            <select id="eco-${s.id}" onchange="markDirty('${s.id}')">
              ${ECONOMIC_STATUS_OPTIONS.map(o => `<option value="${o}" ${p.economicStatus===o?'selected':''}>${o}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="sd-actions">
          <button class="sd-save-btn" id="btn-${s.id}" onclick="saveCard('${sdSelClass}','${s.id}')">Save Data</button>
        </div>
      </div>
    `;
  }).join('');
}

function markDirty(sid) {
  const btn = $(`btn-${sid}`);
  btn.innerText = "⚠️ Save Changes";
  btn.classList.add('dirty');
}

async function saveCard(cid, sid) {
  const data = {
    gender: $(`gen-${sid}`).value,
    address: $(`add-${sid}`).value,
    schoolLevel: $(`sch-${sid}`).value,
    economicStatus: $(`eco-${sid}`).value,
    photo: $(`img-${sid}`).src,
    isOrphan: $(`orp-${sid}`).value === 'Yes',
    updatedAt: new Date().toISOString()
  };

  try {
    const docId = `${cid}__${sid}`;
    await db.collection('studentData').doc(docId).set(data, {merge: true});
    studentProfiles[docId] = data;
    
    const btn = $(`btn-${sid}`);
    btn.innerText = "✅ Saved";
    btn.classList.remove('dirty');
    btn.classList.add('saved');
    setTimeout(() => { btn.innerText = "Save Data"; btn.classList.remove('saved'); }, 2000);
    renderSDStats();
  } catch(e) { toast("Error saving", "er"); }
}

function uploadStudentPhoto(cid, sid) {
  const input = $('sdPhotoInput');
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      $(`img-${sid}`).src = ev.target.result;
      markDirty(sid);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function filterStudentData() { renderSDList(); }

function exportStudentData() {
  const cls = appData.main.classes.find(c => c.id === sdSelClass);
  let csv = "Name,Gender,Address,Orphan,School\n";
  cls.students.forEach(s => {
    const p = studentProfiles[`${sdSelClass}__${s.id}`] || {};
    csv += `"${s.name}","${p.gender||''}","${p.address||''}","${s.orp?'Yes':'No'}","${p.schoolLevel||''}"\n`;
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'students.csv'; a.click();
}

// ===== HOME =====
function renderHome() {
  $('hpName').innerText = user.name;
  const cards = [
    { id: 'A', ic: '✅', title: 'Attendance' },
    { id: 'D', ic: '👥', title: 'Profiles', badge: 'New' },
    { id: 'P', ic: '📚', title: 'Progress' },
    { id: 'R', ic: '📈', title: 'Reports' }
  ];
  $('hpCards').innerHTML = cards.map(c => `
    <div class="hp-card" onclick="showPg('${c.id}')">
      ${c.badge ? `<div class="hp-card-badge">${c.badge}</div>` : ''}
      <div class="hp-card-ic">${c.ic}</div>
      <div class="hp-card-title">${c.title}</div>
    </div>
  `).join('');
}

function refreshUI() {
  if (curPg === 'H') renderHome();
  if (curPg === 'D') renderStudentData();
}

// BOOT
(async function() {
  await initFirebase();
  $('ld').classList.add('hide');
})();
</script>
