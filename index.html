<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quran School Attendance</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<style>
:root{--pri:#1B4965;--pri-l:#2D6A8F;--pri-d:#0F2D3F;--acc:#62B6CB;--acc-l:#BEE9E8;--ok:#2ECC71;--ok-d:#27AE60;--err:#E74C3C;--warn:#F39C12;--orp:#9B59B6;--orp-l:#F4ECF7;--bg:#F0F4F8;--card:#FFF;--txt:#1a1a2e;--txt2:#6B7B8D;--sh:0 4px 24px rgba(27,73,101,.1);--r:16px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);line-height:1.5;overflow-x:hidden}
.hide{display:none!important}
.app{max-width:500px;margin:0 auto;min-height:100vh;position:relative;background:var(--bg)}
.pg{display:none;padding:16px;animation:fadeIn 0.3s ease-out}.pg.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.hd{padding:20px 16px;background:var(--pri);color:#fff;border-radius:0 0 24px 24px;margin-bottom:20px;box-shadow:var(--sh)}
.st{font-size:20px;font-weight:800;margin-bottom:4px}
.hp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:15px}
.hp-card{background:#fff;border-radius:var(--r);padding:20px;text-align:center;box-shadow:var(--sh);cursor:pointer;transition:0.2s}
.hp-card:active{transform:scale(0.96)}
.hp-card-ic{font-size:32px;margin-bottom:10px;display:block}
.hp-card-title{font-size:13px;font-weight:800;color:var(--pri)}

.li{background:#fff;border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh);display:flex;align-items:center;justify-content:space-between}
.ab-g{display:flex;gap:8px}
.ab{width:42px;height:42px;border-radius:12px;border:2px solid #edf2f7;background:#fff;font-weight:800;cursor:pointer}
.ab.p.on{background:var(--ok);color:#fff;border-color:var(--ok)}
.ab.a.on{background:var(--err);color:#fff;border-color:var(--err)}
.ab:disabled{opacity:0.3;cursor:not-allowed}

.mo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,45,63,0.7);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.mo.on{display:flex}
.md{background:#fff;width:100%;max-width:400px;border-radius:24px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,0.2);max-height:90vh;overflow-y:auto}
.mt{font-size:18px;font-weight:800;margin-bottom:16px;color:var(--pri)}
.ig{margin-bottom:16px}
.ig label{display:block;font-size:11px;font-weight:700;margin-bottom:6px;color:var(--txt2);text-transform:uppercase}
.ig input, .ig select, .ig textarea{width:100%;padding:12px;border:2px solid #edf2f7;border-radius:12px;outline:none;font-weight:600}
.btn{width:100%;padding:14px;border:none;border-radius:14px;font-weight:800;cursor:pointer;transition:0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-p{background:var(--pri);color:#fff}
.btn-s{background:#edf2f7;color:var(--pri)}
.st-pre{width:80px;height:80px;border-radius:50%;object-fit:cover;margin:10px auto;display:block;border:3px solid var(--acc);background:#eee}
#ld{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--pri)}
</style>
</head>
<body>

<div id="ld">Initializing...</div>

<div id="app" class="app">
  <div id="pgL" class="pg">
    <div style="text-align:center;padding:40px 20px">
      <div style="font-size:50px">🏫</div>
      <h2 style="color:var(--pri);margin-top:10px">Quran School</h2>
    </div>
    <div class="ig"><label>Username</label><input type="text" id="un" placeholder="Username"></div>
    <div class="ig"><label>Password</label><input type="password" id="pw" placeholder="••••"></div>
    <button class="btn btn-p" onclick="doLogin()">Sign In</button>
  </div>

  <div id="pgH" class="pg">
    <div class="hd">
      <div class="st" id="h_n">...</div>
      <div id="h_r" style="opacity:0.8;font-size:12px">Role</div>
    </div>
    <div class="hp-grid">
      <div class="hp-card" onclick="vPg('pgA')"><span class="hp-card-ic">📅</span><div class="hp-card-title">Attendance</div></div>
      <div class="hp-card" onclick="mStData()"><span class="hp-card-ic">📈</span><div class="hp-card-title">Student Levels</div></div>
      <div class="hp-card" onclick="vPg('pgR')"><span class="hp-card-ic">📊</span><div class="hp-card-title">Reports</div></div>
      <div class="hp-card admin-only" onclick="vPg('pgAdm')"><span class="hp-card-ic">⚙️</span><div class="hp-card-title">Admin</div></div>
    </div>
    <button class="btn btn-s" style="margin-top:24px" onclick="location.reload()">Logout</button>
  </div>

  <div id="pgA" class="pg">
    <div class="st">Daily Attendance</div>
    <div class="ig"><label>Date</label><input type="date" id="ad" onchange="renderSL()"></div>
    <div class="ig"><label>Class</label><select id="as_c" onchange="renderSL()"></select></div>
    <div id="sl_l"></div>
    <button class="btn btn-p" id="sv_btn" onclick="doSaveAtt()" style="margin-top:20px">Save Attendance</button>
    <button class="btn btn-s" style="margin-top:10px" onclick="vPg('pgH')">Back</button>
  </div>
</div>

<div id="mov" class="mo"><div class="md" id="moc"></div></div>

<script>
const $ = id => document.getElementById(id);
const today = () => new Date().toISOString().split('T')[0];

// ======= CONFIGURATION =======
const firebaseConfig = {
  // PASTE_YOUR_CONFIG_HERE
};

let db, storage, user=null, classes=[], users=[], att={}, selCl=null;
const SURAHS = ["Al-Fatiha", "Al-Baqarah", "Al-Imran", "An-Nisa", "Al-Ma'idah", "Al-An'am", "Al-A'raf", "Al-Anfal", "At-Tawbah", "Yunus", "Hud", "Yusuf", "Ar-Ra'd", "Ibrahim", "Al-Hijr", "An-Nahl", "Al-Isra", "Al-Kahf", "Maryam", "Ta-Ha", "Al-Anbiya", "Al-Hajj", "Al-Mu'minun", "An-Nur", "Al-Furqan", "Ash-Shu'ara", "An-Naml", "Al-Qasas", "Al-Ankabut", "Ar-Rum", "Luqman", "As-Sajdah", "Al-Ahzab", "Saba", "Fatir", "Ya-Sin", "As-Saffat", "Sad", "Az-Zumar", "Ghafir", "Fussilat", "Ash-Shura", "Az-Zukhruf", "Ad-Dukhan", "Al-Jathiyah", "Al-Ahqaf", "Muhammad", "Al-Fath", "Al-Hujurat", "Qaf", "Adh-Dhariyat", "At-Tur", "An-Najm", "Al-Qamar", "Ar-Rahman", "Al-Waqi'ah", "Al-Hadid", "Al-Mujadilah", "Al-Hashr", "Al-Mumtahanah", "As-Saff", "Al-Jumu'ah", "Al-Munafiqun", "At-Taghabun", "At-Talaq", "At-Tahrim", "Al-Mulk", "Al-Qalam", "Al-Haqqah", "Al-Ma'arij", "Nuh", "Al-Jinn", "Al-Muzzammil", "Al-Muddaththir", "Al-Qiyamah", "Al-Insan", "Al-Mursalat", "An-Naba", "An-Nazi'at", "Abasa", "At-Takwir", "Al-Infitar", "Al-Mutaffifin", "Al-Inshiqaq", "Al-Buruj", "At-Tariq", "Al-A'la", "Al-Ghashiyah", "Al-Fajr", "Al-Balad", "Ash-Shams", "Al-Layl", "Ad-Duha", "Ash-Sharh", "At-Tin", "Al-Alaq", "Al-Qadr", "Al-Bayyinah", "Az-Zalzalah", "Al-Adiyat", "Al-Qari'ah", "At-Takathur", "Al-Asr", "Al-Humazah", "Al-Fil", "Quraysh", "Al-Ma'un", "Al-Kawthar", "Al-Kafirun", "An-Nasr", "Al-Masad", "Al-Ikhlas", "Al-Falaq", "An-Nas"];

// ======= BOOT =======
async function init() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    storage = firebase.storage();
    
    const d = await db.collection('appData').doc('main').get();
    if(d.exists){
      const data = d.data();
      classes = data.classes || [];
      users = data.users || [];
    }
    const a = await db.collection('attendance').get();
    a.forEach(doc => att[doc.id] = doc.data());

    $('ld').classList.add('hide');
    vPg('pgL');
  } catch(e) {
    $('ld').innerText = "Database Error. Check Keys.";
    console.error(e);
  }
}

function vPg(id) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  $(id).classList.add('on');
  if(id==='pgH') {
    $('h_n').innerText = user.n;
    $('h_r').innerText = user.r.toUpperCase();
    document.querySelectorAll('.admin-only').forEach(e => e.style.display = user.r==='admin'?'block':'none');
  }
  if(id==='pgA') {
    let h = '<option value="">Select Class</option>';
    classes.forEach(c => h += `<option value="${c.id}">${c.name}</option>`);
    $('as_c').innerHTML = h;
    $('ad').value = today();
  }
}

function doLogin() {
  const u = $('un').value, p = $('pw').value;
  const found = users.find(x => x.u === u && x.p === p);
  if(found) { user = found; vPg('pgH'); } else alert('Invalid Login');
}

function renderSL() {
  const cid = $('as_c').value, date = $('ad').value;
  if(!cid) return;
  const cls = classes.find(x => x.id === cid);
  const isToday = date === today();
  const readOnly = user.r === 'teacher' && !isToday;
  
  let h = '';
  cls.students.forEach(s => {
    const mark = (att[date] && att[date][cid]) ? att[date][cid][s.id] : '';
    h += `<div class="li">
      <div class="li-n">${s.n}</div>
      <div class="ab-g">
        <button class="ab p ${mark==='p'?'on':''}" ${readOnly?'disabled':''} onclick="setMark('${cid}','${s.id}','p')">P</button>
        <button class="ab a ${mark==='a'?'on':''}" ${readOnly?'disabled':''} onclick="setMark('${cid}','${s.id}','a')">A</button>
      </div>
    </div>`;
  });
  $('sl_l').innerHTML = h;
  $('sv_btn').disabled = readOnly;
}

function setMark(cid, sid, m) {
  const d = $('ad').value;
  if(!att[d]) att[d] = {};
  if(!att[d][cid]) att[d][cid] = {};
  att[d][cid][sid] = m;
  renderSL();
}

async function doSaveAtt() {
  const d = $('ad').value, cid = $('as_c').value;
  const cls = classes.find(x => x.id === cid);
  const marks = (att[d] && att[d][cid]) ? att[d][cid] : {};

  if(Object.keys(marks).length < cls.students.length) {
    alert('❌ Warning: Some students still do not have marks beside their names.');
    return;
  }

  await db.collection('attendance').doc(d).set({ [cid]: marks }, { merge: true });
  alert('Saved Successfully! ✅');
}

// ======= STUDENT DATA MANAGEMENT =======
function mStData() {
  let opts = '<option value="">Select Student</option>';
  classes.forEach(c => c.students.forEach(s => opts += `<option value="${s.id}">${s.n} (${c.name})</option>`));
  
  showM(`
    <div class="mt">Student Profile & Progress</div>
    <div class="ig"><label>Student</label><select id="ms_s" onchange="uStF()">${opts}</select></div>
    <div class="ig"><label>Age</label><input type="number" id="ms_a"></div>
    <div class="ig"><label>Residence</label><input type="text" id="ms_res"></div>
    <div class="ig"><label>Level</label><select id="ms_l"></select></div>
    <div class="ig"><label>Progress Notes</label><textarea id="ms_p" rows="2"></textarea></div>
    <div class="ig"><label>Photo</label><input type="file" id="ms_f" accept="image/*" onchange="preImg(this)"></div>
    <img id="ms_pre" class="st-pre hide">
    <button class="btn btn-p" id="ms_save" onclick="svStData()">Update Records</button>
    <button class="btn btn-s" style="margin-top:10px" onclick="hideM()">Cancel</button>
  `);
}

function uStF() {
  const sid = $('ms_s').value;
  let s = null, cid = '';
  classes.forEach(c => { const f = c.students.find(x => x.id === sid); if(f){s=f; cid=c.id;}});
  if(!s) return;
  
  $('ms_a').value = s.age || '';
  $('ms_res').value = s.res || '';
  $('ms_p').value = s.prog || '';
  
  let h = '';
  if(cid === 'class2' || cid === 'c2') { // Handle both naming conventions
    SURAHS.forEach(x => h += `<option value="${x}">${x}</option>`);
  } else {
    h = `<option value="letters">Reading Letters</option><option value="words">Reading Words</option><option value="sentences">Reading Sentences</option><option value="writing">Writing</option>`;
  }
  $('ms_l').innerHTML = h;
  $('ms_l').value = s.lvl || '';
  if(s.img) { $('ms_pre').src = s.img; $('ms_pre').classList.remove('hide'); } else $('ms_pre').classList.add('hide');
}

function preImg(input) {
  if (input.files && input.files[0]) {
    const r = new FileReader();
    r.onload = e => { $('ms_pre').src = e.target.result; $('ms_pre').classList.remove('hide'); };
    r.readAsDataURL(input.files[0]);
  }
}

async function svStData() {
  const sid = $('ms_s').value, file = $('ms_f').files[0];
  if(!sid) return;
  
  let s = null;
  classes.forEach(c => { const f = c.students.find(x => x.id === sid); if(f) s=f; });
  
  $('ms_save').innerText = "Uploading...";
  $('ms_save').disabled = true;

  s.age = $('ms_a').value;
  s.res = $('ms_res').value;
  s.lvl = $('ms_l').value;
  s.prog = $('ms_p').value;

  if(file) {
    try {
      const ref = storage.ref(`students/${sid}`);
      const snap = await ref.put(file);
      s.img = await snap.ref.getDownloadURL();
    } catch(e) { console.error("Photo Error", e); }
  }

  await db.collection('appData').doc('main').set({ classes }, { merge: true });
  alert('Updated Successfully! ✅');
  hideM();
}

function showM(h) { $('moc').innerHTML = h; $('mov').classList.add('on'); }
function hideM() { $('mov').classList.remove('on'); }

// Run
init();
</script>
</body>
</html>
