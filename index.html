<style>

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ck{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}

.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.loader .sp{width:48px;height:48px;border:4px solid var(--acc-l);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}

/* LOGIN */
.login-page{min-height:100vh;display:none;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--pri-d),var(--pri),var(--pri-l))}
.login-box{background:#fff;border-radius:24px;padding:40px 28px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.15);animation:fadeUp .5s ease}
.login-logo{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,var(--pri),var(--acc));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:34px;color:#fff}
.login-title{text-align:center;font-size:20px;font-weight:800;color:var(--pri-d);margin-bottom:24px}
.ig{margin-bottom:16px}
.ig label{display:block;font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:5px}
.ig input,.ig select{width:100%;padding:13px 14px;border:2px solid #E8EDF2;border-radius:var(--rs);font:inherit;font-size:14px;transition:.3s;background:#FAFBFC}
.ig input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(98,182,203,.15)}
.lerr{background:#FEE;color:var(--err);padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none;text-align:center}
.btn{width:100%;padding:14px;border:none;border-radius:var(--rs);font:inherit;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.3s}

.btn-s{background:#E8EDF2;color:var(--txt)}
.conn{text-align:center;margin-top:12px;font-size:11px;padding:6px;border-radius:8px}
.conn.y{background:#E8F8F0;color:var(--ok-d)}.conn.n{background:#FEE;color:var(--err)}

/* APP */
.app{display:none;min-height:100vh;padding-bottom:72px}
.top{background:linear-gradient(135deg,var(--pri-d),var(--pri));padding:14px 20px;display:flex;align-items:center;justify-content:space-between;color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.top-t{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.top-a{display:flex;align-items:center;gap:8px}
.top-b{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ubadge{background:rgba(255,255,255,.15);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}

.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;justify-content:center;padding:6px 12px;padding-bottom:max(6px,env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:100}
.ni{flex:1;max-width:90px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px;border:none;background:none;cursor:pointer;color:var(--txt2);font:inherit;font-size:10px;font-weight:600;border-radius:10px}

.pg{display:none;padding:16px 14px 20px}.pg.on{display:block;animation:fadeUp .3s ease}

.card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--sh)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sc{background:var(--card);border-radius:var(--r);padding:14px 12px;box-shadow:var(--sh);text-align:center;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}

.sc.gn::before{background:var(--ok)}.sc.rd::before{background:var(--err)}.sc.pp::before{background:var(--orp)}

<script>
// Parse Firestore attendance doc - handles ALL formats:
function parseAttDoc(raw){
  const out={};
  Object.keys(raw).forEach(k=>{
    const v=raw[k];
    if(k.includes('__')){
      const sep=k.indexOf('__');
      const cid=k.slice(0,sep),sid=k.slice(sep+2);
      if(!out[cid])out[cid]={};out[cid][sid]=v;
    } else if(k.includes('.')&&!k.startsWith('.')){
      const[cid,...rest]=k.split('.');
      const sid=rest.join('.');
      if(!out[cid])out[cid]={};out[cid][sid]=v;
    } else if(v&&typeof v==='object'&&!Array.isArray(v)){
      if(!out[k])out[k]={};
      Object.keys(v).forEach(sid=>{out[k][sid]=v[sid]});
    }
  });
  return out;
}

async function initFirebase(){
  try{
    const s1=document.createElement('script');
    s1.src='https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
    document.head.appendChild(s1);
    await new Promise((r,j)=>{s1.onload=r;s1.onerror=j});
    const s2=document.createElement('script');
    s2.src='https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js';
    document.head.appendChild(s2);
    await new Promise((r,j)=>{s2.onload=r;s2.onerror=j});
    firebase.initializeApp({apiKey:"AIzaSyBeZrJfTv7UKgmg9_yZg94bZ8QOKLtwi04",authDomain:"quranschool26-c77e0.firebaseapp.com",projectId:"quranschool26-c77e0",storageBucket:"quranschool26-c77e0.firebasestorage.app",messagingSenderId:"600563978552",appId:"1:600563978552:web:c18ac92a640a4ff4ddb1cd"});
    DB=firebase.firestore();
    firebaseReady=true;
    await loadAllData();
    DB.collection('attendance').onSnapshot(snap=>{
      att={};
      snap.forEach(d=>{att[d.id]=parseAttDoc(d.data())});
      if(user)refreshDash();
    });
    DB.collection('teacherAttendance').onSnapshot(snap=>{tatt={};snap.forEach(d=>{tatt[d.id]=d.data()})});
    DB.collection('activityLog').orderBy('ts','desc').limit(30).onSnapshot(snap=>{logs=[];snap.forEach(d=>logs.push(d.data()));if(user)refreshDash()});
    DB.collection('appData').doc('main').onSnapshot(doc=>{if(doc.exists){const d=doc.data();if(d.users)users=d.users;if(d.classes)classes=d.classes;if(d.teachers)teachers=d.teachers}});
    return true;
  }catch(e){console.error('Firebase init:',e);return false}
}

async function loadAllData(){
  try{
    const mainDoc=await DB.collection('appData').doc('main').get();
    if(mainDoc.exists){const d=mainDoc.data();if(d.users)users=d.users;if(d.classes)classes=d.classes;if(d.teachers)teachers=d.teachers}
    else{await DB.collection('appData').doc('main').set({classes,teachers,users})}
    const aSnap=await DB.collection('attendance').get();att={};
    aSnap.forEach(d=>{att[d.id]=parseAttDoc(d.data())});
    const tSnap=await DB.collection('teacherAttendance').get();tatt={};tSnap.forEach(d=>{tatt[d.id]=d.data()});
    const lSnap=await DB.collection('activityLog').orderBy('ts','desc').limit(30).get();logs=[];lSnap.forEach(d=>logs.push(d.data()));
  }catch(e){console.error('Load:',e)}
}

async function fbSaveMain(){if(!DB)return;try{await DB.collection('appData').doc('main').set({classes,teachers,users})}catch(e){console.error(e)}}
async function fbSaveAtt(date){
  if(!DB)return;
  try{
    if(att[date]){
      const flat={};
      Object.keys(att[date]).forEach(cid=>{
        const cv=att[date][cid];
        if(typeof cv==='object'){
          Object.keys(cv).forEach(sid=>{flat[cid+'__'+sid]=cv[sid]});
        }
      });
      await DB.collection('attendance').doc(date).set(flat);
    }
    if(tatt[date])await DB.collection('teacherAttendance').doc(date).set(tatt[date]);
  }catch(e){console.error(e)}
}
async function fbLog(action,detail){
  if(!DB)return;
  try{await DB.collection('activityLog').add({user:user?user.n:'?',username:user?user.u:'?',role:user?user.r:'?',action,detail,ts:new Date().toISOString()})}catch(e){console.error(e)}
}

function refreshDash(){
  const td=today(),ts=classes.reduce((s,c)=>s+c.students.length,0),to=classes.reduce((s,c)=>s+c.students.filter(x=>x.o).length,0);
  const ta=att[td]||{};let pr=0,ab=0,opr=0,oab=0;
  const orphanIds=new Set();classes.forEach(c=>c.students.forEach(s=>{if(s.o)orphanIds.add(s.id)}));
  classes.forEach(c=>{const cd=(ta[c.id]||{});c.students.forEach(s=>{const v=cd[s.id];if(v==='present'){pr++;if(s.o)opr++;}else if(v==='absent'){ab++;if(s.o)oab++;}})});
  $('ds').innerHTML=[
    {i:'👨‍🎓',n:ts,l:'Total Students',c:'bl'},
    {i:'✅',n:pr,l:'Present Today',c:'gn'},
    {i:'❌',n:ab,l:'Absent Today',c:'rd'},
    {i:'💜',n:`${to}<span style="font-size:11px;display:block;font-weight:600;color:var(--ok-d)">✅${opr} ❌${oab}</span>`,l:'Orphans Today',c:'pp'}
  ].map(s=>`<div class="sc ${s.c}"><div class="si">${s.i}</div><div class="sn">${s.n}</div><div class="sl">${s.l}</div></div>`).join('');
  $('al').innerHTML=logs.length===0?'<p style="text-align:center;padding:16px">No activity yet</p>':logs.slice(0,15).map(l=>{
    const t=l.ts?new Date(l.ts):null;const tm=t?t.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    const ic=l.role==='admin'?'👨‍💼':'👨‍🏫';
    return`<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f0f0f0;gap:6px"><div style="flex:1"><div style="font-weight:700;font-size:12px">${ic} ${l.user||l.username}</div><div style="font-size:10px;color:var(--txt2);margin-top:1px">${l.detail||l.action}</div></div><div style="font-size:9px;color:var(--txt2);white-space:nowrap">${tm}</div></div>`
  }).join('');
}

function renderCS(){$('csel').innerHTML=classes.map(c=>`<button class="cb ${selCl===c.id?'on':''}" onclick="selClass('${c.id}')">${c.name}<small>${c.students.length} students</small></button>`).join('')}
function selClass(id){selCl=id;filt='all';renderCS();renderSF();renderSL();$('acon').style.display='block';$('svb').style.display='block'}
function renderSF(){const c=classes.find(x=>x.id===selCl);if(!c)return;$('sf').innerHTML=`<button class="fb ${filt==='all'?'on':''}" onclick="setF('all')">All (${c.students.length})</button><button class="fb ot ${filt==='orphans'?'on':''}" onclick="setF('orphans')">💜 Orphans (${c.students.filter(s=>s.o).length})</button>`}
function setF(m){filt=m;renderSF();renderSL()}

function renderSL(){
  const c=classes.find(x=>x.id===selCl);if(!c)return;
  const dt=$('ad').value,da=(att[dt]||{})[selCl]||{};
  let st=c.students;if(filt==='orphans')st=st.filter(s=>s.o);
  $('sl').innerHTML=st.map((s,i)=>{const v=da[s.id]||'';const idx=c.students.indexOf(s)+1;
    return`<div class="si2 ${s.o?'orp':''}"><div class="snum">${idx}</div><div class="sname">${s.o?'<span class="ob">💜</span> ':''}${s.name}</div><div class="abs"><button class="ab ${v==='present'?'p':''}" onclick="setAt('${s.id}','present',this)">✓</button><button class="ab ${v==='absent'?'a':''}" onclick="setAt('${s.id}','absent',this)">✕</button></div></div>`}).join('')
}

function setAt(sid,st,btn){const dt=$('ad').value;if(!att[dt])att[dt]={};if(!att[dt][selCl])att[dt][selCl]={};if(att[dt][selCl][sid]===st){delete att[dt][selCl][sid];btn.className='ab'}else{att[dt][selCl][sid]=st;btn.parentElement.querySelectorAll('.ab').forEach(b=>b.className='ab');btn.classList.add(st==='present'?'p':'a')}}

function mAll(st){const c=classes.find(x=>x.id===selCl);if(!c)return;const dt=$('ad').value;if(!att[dt])att[dt]={};if(!att[dt][selCl])att[dt][selCl]={};let ss=c.students;if(filt==='orphans')ss=ss.filter(s=>s.o);ss.forEach(s=>{att[dt][selCl][s.id]=st});renderSL()}

async function doSave(){
  if(!selCl)return;const btn=$('svbn');btn.disabled=true;btn.innerHTML='<span class="sp" style="width:18px;height:18px;border-width:3px;display:inline-block"></span> Saving...';
  const dt=$('ad').value;const cls=classes.find(x=>x.id===selCl);
  const da=(att[dt]||{})[selCl]||{};const pc=Object.values(da).filter(v=>v==='present').length;const ac=Object.values(da).filter(v=>v==='absent').length;
  await fbSaveAtt(dt);
  await fbLog('attendance',`${cls?cls.name:selCl} | ${dt} | ✅${pc} ❌${ac}`);
  btn.disabled=false;btn.innerHTML='💾 Saved ✅';setTimeout(()=>{btn.innerHTML='💾 Save Attendance'},2000);
  toast('Saved to server ✅','ok');refreshDash();

function initFilters(){
  const ms=$('rm'),now=new Date();ms.innerHTML='';
  for(let i=0;i<6;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);const v=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');ms.innerHTML+=`<option value="${v}">${d.toLocaleDateString('en-US',{year:'numeric',month:'long'})}</option>`}
  const cs=$('rc');cs.innerHTML='<option value="all">All Classes</option>';classes.forEach(c=>{cs.innerHTML+=`<option value="${c.id}">${c.name}</option>`})
}

function doReport(){const m=$('rm').value,cf=$('rc').value,tp=$('rtp').value;const[y,mn]=m.split('-').map(Number),dm=dim(y,mn);if(tp==='teachers')rptT(y,mn,dm);else rptS(y,mn,dm,cf,tp)}

function rptS(y,mn,dm,cf,tp){
  const cl=cf==='all'?classes:classes.filter(c=>c.id===cf);let rows=[];
  cl.forEach(c=>{
    let st=c.students;
    if(tp==='orphans')st=st.filter(s=>s.o);
    else if(tp==='nonorphans')st=st.filter(s=>!s.o);
    st.forEach(s=>{
      let p=0,a=0,school=0;
      for(let d=1;d<=dm;d++){
        const ds=y+'-'+String(mn).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        const dy=new Date(y,mn-1,d).getDay();
        if(dy===5||dy===6)continue;
        if(new Date(ds)>new Date())continue;
        const dayData=att[ds];
        if(!dayData)continue;
        school++;
        const val=(dayData[c.id]||{})[s.id];
        if(val==='present')p++;
        else if(val==='absent')a++;
      }
      const tt=p+a,pc=tt>0?Math.round(p/tt*100):null;
      rows.push({n:s.name,cn:c.name,p,a,tt,pc,o:s.o});
    });
  });
  const total=rows.length,recorded=rows.filter(r=>r.tt>0).length;
  const avgPc=recorded>0?Math.round(rows.filter(r=>r.tt>0).reduce((s,r)=>s+r.pc,0)/recorded):0;
  const label=tp==='orphans'?'💜 Orphans Only':tp==='nonorphans'?'👤 Non-Orphans Only':'All Students';
  $('ro').innerHTML=rows.length===0
    ?`<div class="card" style="text-align:center;padding:24px;color:var(--txt2)">No students found for this filter</div>`
    :`<div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
        <div class="sc bl" style="flex:1;min-width:80px;padding:10px"><div class="si" style="font-size:16px">👥</div><div class="sn" style="font-size:18px">${total}</div><div class="sl">Students</div></div>
        <div class="sc gn" style="flex:1;min-width:80px;padding:10px"><div class="si" style="font-size:16px">📊</div><div class="sn" style="font-size:18px">${recorded}</div><div class="sl">With Records</div></div>
        <div class="sc ${avgPc>=80?'gn':avgPc>=60?'':' rd'}" style="flex:1;min-width:80px;padding:10px"><div class="si" style="font-size:16px">📈</div><div class="sn" style="font-size:18px">${avgPc}%</div><div class="sl">Avg Rate</div></div>
      </div>
      <div style="margin-bottom:10px;font-size:13px;font-weight:700;color:var(--pri)">${label} — ${total} students</div>
      <div style="overflow-x:auto"><table class="rt"><thead><tr><th>#</th><th style="text-align:left">Name</th><th>Class</th><th>✅P</th><th>❌A</th><th>Days</th><th>Rate%</th></tr></thead>
      <tbody>${rows.map((r,i)=>`<tr class="${r.o?'or':''}">
        <td style="color:var(--txt2)">${i+1}</td>
        <td style="text-align:left;font-weight:600">${r.o?'💜 ':''}${r.n}</td>
        <td style="font-size:10px">${r.cn}</td>
        <td style="color:var(--ok);font-weight:700">${r.p}</td>
        <td style="color:var(--err);font-weight:700">${r.a}</td>
        <td style="color:var(--txt2)">${r.tt}</td>
        <td>${r.pc!==null
          ?`<b style="color:${r.pc>=80?'var(--ok)':r.pc>=60?'var(--warn)':'var(--err)'}">${r.pc}%</b><div class="pb"><div class="pf ${r.pc>=80?'ph':r.pc>=60?'pm':'pl'}" style="width:${r.pc}%"></div></div>`
          :'<span style="color:var(--txt2);font-size:10px">No data</span>'}</td>
      </tr>`).join('')}</tbody></table></div>`
}
function rptT(y,mn,dm){
  let rows=[];teachers.forEach(t=>{let p=0,a=0;for(let d=1;d<=dm;d++){const ds=y+'-'+String(mn).padStart(2,'0')+'-'+String(d).padStart(2,'0');const dy=new Date(y,mn-1,d).getDay();if(dy===5||dy===6)continue;const x=(tatt[ds]||{})[t.id];if(x==='present')p++;else if(new Date(ds)<new Date(today()))a++}const tt=p+a,pc=tt>0?Math.round(p/tt*100):0;rows.push({n:t.name,p,a,pc})});
  $('ro').innerHTML=`<div style="overflow-x:auto"><table class="rt"><thead><tr><th>Teacher</th><th>P</th><th>A</th><th>%</th></tr></thead><tbody>${rows.map(r=>`<tr><td style="text-align:left;font-weight:600">${r.n}</td><td style="color:var(--ok);font-weight:700">${r.p}</td><td style="color:var(--err);font-weight:700">${r.a}</td><td><b>${r.pc}%</b><div class="pb"><div class="pf ${r.pc>=80?'ph':r.pc>=60?'pm':'pl'}" style="width:${r.pc}%"></div></div></td></tr>`).join('')}</tbody></table></div>`
}

function doAdminSearch(val) {
  adminSearchTerm = val.toLowerCase();
  renderAdmin();
}

function renderAdmin(){
  let h='';
  classes.forEach(c=>{
    const filteredStudents = c.students.filter(s => s.name.toLowerCase().includes(adminSearchTerm));
    if (filteredStudents.length > 0 || adminSearchTerm === '') {
      const oc=c.students.filter(s=>s.o).length;
      h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px"><strong>${c.name} (${c.students.length})${oc?' <span style="color:var(--orp)">💜'+oc+'</span>':''}</strong><button class="abtn ad" onclick="mAddS('${c.id}')">+ Add</button></div><div style="max-height:280px;overflow-y:auto">`;
      h+=filteredStudents.map((s)=>{
        const originalIndex = c.students.indexOf(s) + 1;
        return `<div class="ali ${s.o?'io':''}"><span style="font-weight:800;color:var(--pri);width:22px;font-size:11px">${originalIndex}</span><span class="nm">${s.o?'💜 ':''}${s.name}</span><button class="abtn ot ${s.o?'on':''}" onclick="tgO('${c.id}','${s.id}')">💜</button><button class="abtn ed" onclick="mEdS('${c.id}','${s.id}')">✏️</button><button class="abtn dl" onclick="dS('${c.id}','${s.id}')">🗑️</button></div>`}).join('');
      h+=`</div></div>`;
    }
  });
  h+=`<button class="abtn ad" onclick="mAddC()" style="margin-top:6px">+ Add Class</button>`;
  $('ac').innerHTML=h;
  $('at').innerHTML=teachers.map(t=>`<div class="ali"><span class="nm">${t.name}</span><span style="font-size:11px;color:var(--txt2)">@${t.u}</span><button class="abtn ed" onclick="mEdT('${t.id}')">✏️</button><button class="abtn dl" onclick="dT('${t.id}')">🗑️</button></div>`).join('');
  $('ap').innerHTML=users.map(u=>`<div class="ali"><span class="nm">${u.n} (@${u.u})</span><button class="abtn ed" onclick="mPW('${u.u}')">🔑</button></div>`).join('')
}

async function aT(){const n=$('_n').value.trim(),u=$('_u').value.trim(),p=$('_p').value.trim();if(!u||!p)return;const id='t_'+Date.now();teachers.push({id,name:n||u,u});users.push({u,p,r:'teacher',n:n||u,tid:id});await fbSaveMain();hideM();renderAdmin();toast('Added ✅')}

function mPW(un){showM(`<div class="mt">Change Password</div><div class="ig"><label>New Password</label><input type="text" id="_p"></div><div class="mb"><button class="btn btn-p" onclick="svPW('${un}')">Save</button><button class="btn btn-s" onclick="hideM()">Cancel</button></div>`)}
