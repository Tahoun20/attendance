<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quran School Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* CSS STYLES - PRESERVED & OPTIMIZED */
:root{--pri:#1B4965;--pri-l:#2D6A8F;--pri-d:#0F2D3F;--acc:#62B6CB;--acc-l:#BEE9E8;--ok:#2ECC71;--ok-d:#27AE60;--err:#E74C3C;--warn:#F39C12;--orp:#9B59B6;--orp-l:#F4ECF7;--bg:#F0F4F8;--card:#FFF;--txt:#1a1a2e;--txt2:#6B7B8D;--sh:0 4px 24px rgba(27,73,101,.1);--r:16px;--rs:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.loader .sp{width:48px;height:48px;border:4px solid var(--acc-l);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader.hide{display:none}
.login-page{min-height:100vh;display:none;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--pri-d),var(--pri))}
.login-box{background:#fff;border-radius:24px;padding:40px 28px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.ig{margin-bottom:16px}
.ig label{display:block;font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:5px}
.ig input, .ig select{width:100%;padding:12px;border:2px solid #E8EDF2;border-radius:var(--rs);font:inherit}
.btn{width:100%;padding:14px;border:none;border-radius:var(--rs);font-weight:700;cursor:pointer;transition:.3s}
.btn-p{background:var(--pri);color:#fff}
.app{display:none;padding-bottom:80px}
.top{background:var(--pri-d);padding:14px 20px;display:flex;justify-content:space-between;color:#fff;position:sticky;top:0;z-index:100}
.pg{display:none;padding:16px 14px}.pg.on{display:block}
.card{background:#fff;border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--sh)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sc{background:#fff;border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--sh)}
.sn{font-size:24px;font-weight:900}.sl{font-size:11px;color:var(--txt2)}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;justify-content:center;padding:10px;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;border:none;background:none;font-size:10px;color:var(--txt2)}
.ni.on{color:var(--pri)}
.rt{width:100%;border-collapse:collapse;font-size:12px}.rt th{background:var(--pri);color:#fff;padding:8px}.rt td{padding:8px;text-align:center;border-bottom:1px solid #eee}
</style>
</head>
<body>

<div class="loader" id="ld"><div class="sp"></div><div>Loading School System...</div></div>

<div class="login-page" id="lp">
    <div class="login-box">
        <h2 style="text-align:center;margin-bottom:20px">Quran School Login</h2>
        <div id="le" style="color:red;display:none;text-align:center;margin-bottom:10px"></div>
        <div class="ig"><label>Username</label><input type="text" id="un"></div>
        <div class="ig"><label>Password</label><input type="password" id="pw"></div>
        <button class="btn btn-p" onclick="doLogin()">Sign In</button>
    </div>
</div>

<div class="app" id="app">
    <div class="top">
        <div id="topTitle">Home</div>
        <button onclick="doLogout()" style="background:none;border:none;color:#fff;font-size:20px">🚪</button>
    </div>

    <div class="pg on" id="pgH">
        <div class="card" id="adminDateCard" style="display:none">
            <label style="font-size:12px;font-weight:700">Check Date Status:</label>
            <input type="date" id="homeDate" onchange="refreshDash()" style="width:100%;padding:8px;margin-top:5px;border:1px solid #ddd;border-radius:8px">
        </div>
        <div id="ds" class="sg"></div>
        <div id="hpCards" class="sg"></div>
    </div>

    <div class="pg" id="pgA">
        <div class="card">
            <input type="date" id="ad" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd">
            <select id="csel" style="width:100%;margin-top:10px;padding:10px" onchange="renderSL()"></select>
        </div>
        <div id="sl"></div>
        <button class="btn btn-p" onclick="doSave()" style="margin-top:10px">Save Attendance</button>
    </div>

    <div class="pg" id="pgR">
        <div class="card">
            <select id="reportType" onchange="toggleReport()" style="width:100%;padding:10px;margin-bottom:10px">
                <option value="monthly">Monthly Report</option>
                <option value="daily">Daily Report</option>
            </select>
            <div id="mSelects">
                <select id="rm" style="width:100%;padding:10px;margin-bottom:10px"></select>
            </div>
            <div id="dSelects" style="display:none">
                <input type="date" id="rdt" style="width:100%;padding:10px;margin-bottom:10px">
            </div>
            <button class="btn btn-p" onclick="doReport()">Generate</button>
        </div>
        <div id="ro" class="card" style="overflow-x:auto"></div>
    </div>

    <div class="bnav" id="bnav"></div>
</div>

<script type="module">
// FIREBASE IMPORT & BOOT LOGIC
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = { /* Your config will be automatically injected if hosted on Firebase, otherwise add it here */ };
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// DATA & STATE
const CLASSES = [
    {id:'c1', name:'Class 1', students:[{id:'s1',name:'Saidu M. Kanu',o:1},{id:'s2',name:'Abu-bakar Kamara',o:0}]},
    {id:'c2', name:'Class 2', students:[{id:'s42',name:'Musa Kamara',o:1},{id:'s43',name:'Foday A. Kamara',o:1}]}
];
const USERS = [{u:'admin', p:'admin123', r:'admin', n:'Administrator'}];

let user = null;
let att = {}; // Student attendance
let tatt = {}; // Teacher attendance

window.doLogin = () => {
    const u = document.getElementById('un').value;
    const p = document.getElementById('pw').value;
    const found = USERS.find(x => x.u === u && x.p === p);
    if(found) {
        user = found;
        document.getElementById('lp').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        initApp();
    } else {
        document.getElementById('le').innerText = "Invalid credentials";
        document.getElementById('le').style.display = 'block';
    }
};

async function initApp() {
    document.getElementById('ld').classList.add('hide');
    if(user.r === 'admin') document.getElementById('adminDateCard').style.display = 'block';
    document.getElementById('homeDate').value = new Date().toISOString().split('T')[0];
    setupNav();
    refreshDash();
    fillSelectors();
}

function setupNav() {
    const nav = document.getElementById('bnav');
    const items = [
        {id:'H', n:'Home', i:'🏠'},
        {id:'A', n:'Attendance', i:'✅'},
        {id:'R', n:'Reports', i:'📊'}
    ];
    nav.innerHTML = items.map(x => `<button class="ni" onclick="showPg('${x.id}')"><span>${x.i}</span>${x.n}</button>`).join('');
}

window.showPg = (id) => {
    document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
    document.getElementById('pg'+id).classList.add('on');
};

window.refreshDash = () => {
    const targetDate = document.getElementById('homeDate').value;
    const sData = att[targetDate] || {};
    // Logic to calculate counts...
    document.getElementById('ds').innerHTML = `
        <div class="sc"><b>${targetDate}</b><div class="sl">Status View</div></div>
        <div class="sc"><b>Check</b><div class="sl">Reports Tab</div></div>
    `;
};

window.toggleReport = () => {
    const isDaily = document.getElementById('reportType').value === 'daily';
    document.getElementById('mSelects').style.display = isDaily ? 'none' : 'block';
    document.getElementById('dSelects').style.display = isDaily ? 'block' : 'none';
};

window.doReport = () => {
    const type = document.getElementById('reportType').value;
    const out = document.getElementById('ro');
    if(type === 'daily') {
        const d = document.getElementById('rdt').value;
        out.innerHTML = `<h4>Daily Report for ${d}</h4><p>No records found for this date.</p>`;
    } else {
        out.innerHTML = `<h4>Monthly Summary</h4><p>Generating calculation...</p>`;
    }
};

function fillSelectors() {
    const csel = document.getElementById('csel');
    csel.innerHTML = CLASSES.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    
    const rm = document.getElementById('rm');
    const now = new Date();
    rm.innerHTML = `<option value="${now.getFullYear()}-${now.getMonth()+1}">${now.toLocaleString('default', { month: 'long' })}</option>`;
}

window.doLogout = () => { location.reload(); };

// Ensure loader hides if something fails
setTimeout(() => document.getElementById('ld').classList.add('hide'), 2000);
</script>
</body>
</html>
